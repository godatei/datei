# yaml-language-server: $schema=https://spec.openapis.org/oas/3.0/schema/2024-10-18
openapi: "3.0.0"
info:
  version: 1.0.0
  title: Datei API
paths:
  /api/v1/datei:
    post:
      summary: Create a new Datei
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CreateDateiRequest"
      responses:
        "201":
          description: Datei created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DateiResponse"
        "400":
          description: Invalid request
        "409":
          description: Conflict (e.g., parent directory not found)
    get:
      summary: List all Datei
      parameters:
        - name: limit
          in: query
          description: Maximum number of results
          schema:
            type: integer
            default: 100
        - name: offset
          in: query
          description: Number of results to skip
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of Datei
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDateiResponse"
        "400":
          description: Invalid query parameters
  /api/v1/datei/{id}:
    patch:
      summary: Update a Datei
      parameters:
        - name: id
          in: path
          required: true
          description: Datei ID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/UpdateDateiRequest"
      responses:
        "200":
          description: Datei updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DateiResponse"
        "400":
          description: Invalid request
        "404":
          description: Datei not found
    delete:
      summary: Delete a Datei
      parameters:
        - name: id
          in: path
          required: true
          description: Datei ID
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Datei deleted successfully
        "404":
          description: Datei not found
        "409":
          description: Cannot delete (e.g., directory not empty)
components:
  schemas:
    # Datei schemas
    DateiVersion:
      type: object
      required:
        - id
        - s3Key
        - fileSize
        - checksum
        - mimeType
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: Version ID
        fileSize:
          type: integer
          format: int64
          description: File size in bytes
        checksum:
          type: string
          description: File checksum
        mimeType:
          type: string
          description: MIME type
        contentMd:
          type: string
          nullable: true
          description: Markdown content preview
        createdBy:
          type: string
          format: uuid
          nullable: true
          description: User ID of uploader
        createdAt:
          type: string
          format: date-time
          description: Version creation timestamp
    CreateDateiRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Name for the new Datei
        file:
          type: string
          format: binary
          description: File data (optional, omit for directories)
    UpdateDateiRequest:
      type: object
      properties:
        name:
          type: string
          description: New name for the Datei (optional)
        file:
          type: string
          format: binary
          description: New file data (optional)
    DateiResponse:
      type: object
      required:
        - id
        - isDirectory
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier
        parentId:
          type: string
          format: uuid
          nullable: true
          description: Parent directory ID
        isDirectory:
          type: boolean
          description: Whether this is a directory
        linkedDateiId:
          type: string
          format: uuid
          nullable: true
          description: ID of linked Datei (for symlinks)
        name:
          type: string
          nullable: true
          description: Current name of the Datei
        latestVersion:
          $ref: "#/components/schemas/DateiVersion"
          nullable: true
          description: Latest version/upload of the file
        createdBy:
          type: string
          format: uuid
          nullable: true
          description: User ID of creator
        trashedAt:
          type: string
          format: date-time
          nullable: true
          description: Trash timestamp
        trashedBy:
          type: string
          format: uuid
          nullable: true
          description: User ID who trashed it
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
    ListDateiResponse:
      type: object
      required:
        - items
        - total
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/DateiResponse"
          description: Array of Datei objects
        total:
          type: integer
          description: Total number of items (before pagination)
