# yaml-language-server: $schema=https://spec.openapis.org/oas/3.0/schema/2024-10-18
openapi: '3.0.0'
info:
  version: 1.0.0
  title: Datei API
paths:
  # Auth (public, no authentication required)
  /api/v1/auth/login:
    $ref: ./paths/auth_login.yaml
  /api/v1/auth/login/config:
    $ref: ./paths/auth_login_config.yaml
  /api/v1/auth/register:
    $ref: ./paths/auth_register.yaml
  /api/v1/auth/reset:
    $ref: ./paths/auth_reset.yaml

  # Settings (authentication required)
  /api/v1/settings/reset-password:
    $ref: ./paths/settings_reset_password.yaml
  /api/v1/settings/user:
    $ref: ./paths/settings_user.yaml
  /api/v1/settings/user/email:
    $ref: ./paths/settings_user_email.yaml
  /api/v1/settings/verify/request:
    $ref: ./paths/settings_verify_request.yaml
  /api/v1/settings/verify/confirm:
    $ref: ./paths/settings_verify_confirm.yaml
  /api/v1/settings/mfa/setup:
    $ref: ./paths/settings_mfa_setup.yaml
  /api/v1/settings/mfa/enable:
    $ref: ./paths/settings_mfa_enable.yaml
  /api/v1/settings/mfa/disable:
    $ref: ./paths/settings_mfa_disable.yaml
  /api/v1/settings/mfa/recovery-codes/regenerate:
    $ref: ./paths/settings_mfa_recovery_codes_regenerate.yaml
  /api/v1/settings/mfa/recovery-codes/status:
    $ref: ./paths/settings_mfa_recovery_codes_status.yaml
  /api/v1/settings/emails:
    $ref: ./paths/settings_emails.yaml
  /api/v1/settings/emails/{emailId}:
    $ref: ./paths/settings_emails_id.yaml
  /api/v1/settings/emails/{emailId}/primary:
    $ref: ./paths/settings_emails_id_primary.yaml

  # Admin (authentication + admin role required)
  /api/v1/admin/users:
    $ref: ./paths/admin_users.yaml
  /api/v1/admin/users/{id}:
    $ref: ./paths/admin_users_id.yaml
  /api/v1/admin/users/{id}/password:
    $ref: ./paths/admin_users_id_password.yaml
  /api/v1/admin/users/{id}/emails:
    $ref: ./paths/admin_users_id_emails.yaml
  /api/v1/admin/users/{id}/emails/{emailId}:
    $ref: ./paths/admin_users_id_emails_emailid.yaml
  /api/v1/admin/users/{id}/emails/{emailId}/primary:
    $ref: ./paths/admin_users_id_emails_emailid_primary.yaml
  /api/v1/admin/users/{id}/mfa/disable:
    $ref: ./paths/admin_users_id_mfa_disable.yaml
  /api/v1/admin/users/{id}/archive:
    $ref: ./paths/admin_users_id_archive.yaml

  # Datei (authentication required)
  /api/v1/trash:
    $ref: './paths/trash.yaml'
  /api/v1/trash/{dateiId}/children:
    $ref: './paths/trash_id_children.yaml'
  /api/v1/trash/{dateiId}/restore:
    $ref: './paths/trash_id_restore.yaml'
  /api/v1/datei:
    $ref: ./paths/datei.yaml
  /api/v1/datei/{id}:
    $ref: ./paths/datei_id.yaml
  /api/v1/datei/{id}/download:
    $ref: './paths/datei_id_download.yaml'
  /api/v1/datei/{id}/thumbnail:
    $ref: './paths/datei_id_thumbnail.yaml'
  /api/v1/datei/{id}/path:
    $ref: './paths/datei_id_path.yaml'

  # Links (authentication required)
  /api/v1/links:
    $ref: ./paths/links.yaml
  /api/v1/links/{id}:
    $ref: ./paths/links_id.yaml
  /api/v1/links/{id}/rotate:
    $ref: ./paths/links_id_rotate.yaml
  /api/v1/links/{id}/dateien:
    $ref: ./paths/links_id_dateien.yaml
  /api/v1/links/{id}/dateien/{dateiId}:
    $ref: ./paths/links_id_dateien_dateiid.yaml

  # Public Links (unlock is unauthenticated; list/download require the JWT
  # returned by unlock as a Bearer credential)
  /api/v1/public/links/{key}/unlock:
    $ref: ./paths/public_links_key_unlock.yaml
  /api/v1/public/dateien:
    $ref: ./paths/public_dateien.yaml
  /api/v1/public/dateien/{dateiId}/download:
    $ref: ./paths/public_dateien_dateiid_download.yaml
components:
  securitySchemes:
    bearerHttpAuthentication:
      description: Bearer token using a JWT
      type: http
      scheme: Bearer
      bearerFormat: JWT
    publicLinkBearerAuthentication:
      description: Short-lived JWT obtained from POST /api/v1/public/links/{key}/unlock
      type: http
      scheme: Bearer
      bearerFormat: JWT
