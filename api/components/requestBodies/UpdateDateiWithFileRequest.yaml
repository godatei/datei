type: object
properties:
  name:
    type: string
    description: New name for the Datei (optional)
    nullable: true
  parentId:
    type: string
    format: uuid
    description: New parent directory ID (optional; empty string moves to root)
    nullable: true
  file:
    type: string
    format: binary
    description: New file data (optional)
    nullable: true
