type: object
required:
  - fileSize
  - checksum
  - mimeType
properties:
  fileSize:
    type: integer
    format: int64
    description: File size in bytes
  checksum:
    type: string
    description: File checksum
  mimeType:
    type: string
    description: MIME type
  contentMd:
    type: string
    nullable: true
    description: Markdown content preview
