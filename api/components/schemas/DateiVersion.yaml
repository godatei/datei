type: object
required:
  - id
  - fileSize
  - checksum
  - mimeType
  - createdAt
properties:
  id:
    type: string
    format: uuid
    description: Version ID
  fileSize:
    type: integer
    format: int64
    description: File size in bytes
  checksum:
    type: string
    description: File checksum
  mimeType:
    type: string
    description: MIME type
  contentMd:
    type: string
    nullable: true
    description: Markdown content preview
  createdBy:
    type: string
    format: uuid
    nullable: true
    description: User ID of uploader
  createdAt:
    type: string
    format: date-time
    description: Version creation timestamp
