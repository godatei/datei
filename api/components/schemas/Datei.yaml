type: object
required:
  - id
  - name
  - isDirectory
  - createdAt
  - updatedAt
properties:
  id:
    type: string
    format: uuid
    description: Unique identifier
  parentId:
    type: string
    format: uuid
    nullable: true
    description: Parent directory ID
  isDirectory:
    type: boolean
    description: Whether this is a directory
  linkedDateiId:
    type: string
    format: uuid
    nullable: true
    description: ID of linked Datei (for symlinks)
  name:
    type: string
    nullable: true
    description: Current name of the Datei
  size:
    type: integer
    format: int64
    nullable: true
    description: File size in bytes (null for directories)
  checksum:
    type: string
    nullable: true
    description: File checksum (null for directories)
  mimeType:
    type: string
    nullable: true
    description: MIME type (null for directories)
  contentMd:
    type: string
    nullable: true
    description: Markdown content preview
  createdBy:
    type: string
    format: uuid
    nullable: true
    description: User ID of creator
  trashedAt:
    type: string
    format: date-time
    nullable: true
    description: Trash timestamp
  trashedBy:
    type: string
    format: uuid
    nullable: true
    description: User ID who trashed it
  createdAt:
    type: string
    format: date-time
    description: Creation timestamp
  updatedAt:
    type: string
    format: date-time
    description: Last update timestamp
  updatedBy:
    type: string
    format: uuid
    nullable: true
    description: User ID who last updated it
