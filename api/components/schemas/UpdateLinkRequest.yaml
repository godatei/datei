type: object
properties:
  name:
    type: string
    nullable: true
    minLength: 1
    maxLength: 255
    description: New display name (omit to leave unchanged; must not be blank when set)
  expiresAt:
    type: string
    format: date-time
    nullable: true
    description: New expiration timestamp (only used when clearExpiration is false)
  clearExpiration:
    type: boolean
    nullable: true
    description: When true, clears the expiration (link never expires); takes precedence over expiresAt
  code:
    type: string
    nullable: true
    maxLength: 128
    description: New plain-text code (only used when clearCode is false)
  clearCode:
    type: boolean
    nullable: true
    description: When true, clears the code (no code required); takes precedence over code
