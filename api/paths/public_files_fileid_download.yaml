get:
  operationId: DownloadPublicLinkFile
  summary: Download a file via the unlocked public link
  security:
    - publicLinkBearerAuthentication: []
  parameters:
    - name: fileId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: File content
      headers:
        Content-Disposition:
          required: true
          schema:
            type: string
        Content-Type:
          required: true
          schema:
            type: string
      content:
        application/octet-stream: {}
    '401':
      description: Token missing or expired
    '403':
      description: Link state changed since unlock (revoked, expired) or file not shared
    '404':
      description: File not found in the link's shared scope
    '409':
      description: File is a directory
