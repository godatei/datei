post:
  operationId: ArchiveUserAdmin
  summary: Archive a user account (admin only)
  security:
    - bearerHttpAuthentication: []
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '204':
      description: User archived
    '403':
      description: Caller is not an admin
    '404':
      description: User not found
delete:
  operationId: UnarchiveUserAdmin
  summary: Unarchive a user account (admin only)
  security:
    - bearerHttpAuthentication: []
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '204':
      description: User unarchived
    '403':
      description: Caller is not an admin
    '404':
      description: User not found
