get:
  operationId: DownloadFile
  summary: Download a File
  security:
    - bearerHttpAuthentication: []
  parameters:
    - name: id
      in: path
      required: true
      description: File ID
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: File content
      headers:
        Content-Disposition:
          required: true
          schema:
            type: string
          description: 'Attachment header with filename'
        Content-Type:
          required: true
          schema:
            type: string
          description: MIME type of the file
      content:
        application/octet-stream: {}
    '404':
      description: File not found
    '409':
      description: Cannot download (e.g., is a directory)
