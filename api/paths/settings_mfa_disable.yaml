post:
  operationId: DisableMFA
  summary: Disable MFA
  security:
    - bearerHttpAuthentication: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/DisableMFARequest.yaml'
  responses:
    '204':
      description: MFA disabled
    '403':
      description: Invalid password or MFA not enabled
