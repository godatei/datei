post:
  operationId: RotateLinkAccessToken
  summary: Generate a new access token, invalidating the old URL
  security:
    - bearerHttpAuthentication: []
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: Link with new access token
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Link.yaml'
    '404':
      description: Link not found
