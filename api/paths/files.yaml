post:
  operationId: CreateFile
  summary: Create a new file
  security:
    - bearerHttpAuthentication: []
  requestBody:
    required: true
    content:
      multipart/form-data:
        schema:
          $ref: '../components/requestBodies/CreateFileRequest.yaml'
  responses:
    '201':
      description: File created successfully
      content:
        application/json:
          schema:
            $ref: '../components/schemas/File.yaml'
    '400':
      description: Invalid request
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
            required:
              - message
    '409':
      description: Conflict (e.g., parent directory not found)

get:
  operationId: ListFiles
  summary: List all files
  security:
    - bearerHttpAuthentication: []
  parameters:
    - name: parentId
      in: query
      description: Parent directory ID (omit for root)
      schema:
        type: string
        format: uuid
    - name: limit
      in: query
      description: Maximum number of results
      schema:
        type: integer
        default: 100
    - name: offset
      in: query
      description: Number of results to skip
      schema:
        type: integer
        default: 0
  responses:
    '200':
      description: List of files
      content:
        application/json:
          schema:
            $ref: '../components/schemas/ListFilesResponse.yaml'
    '400':
      description: Invalid query parameters
