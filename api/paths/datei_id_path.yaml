get:
  operationId: GetDateiPath
  summary: Get the ancestor path of a Datei from root
  security:
    - bearerHttpAuthentication: []
  parameters:
    - name: id
      in: path
      required: true
      description: Datei ID
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: Ordered list of ancestors from root to the given Datei (inclusive)
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../components/schemas/DateiPathItem.yaml'
    '404':
      description: Datei not found
