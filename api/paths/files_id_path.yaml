get:
  operationId: GetFilePath
  summary: Get the ancestor path of a File from root
  description: |
    Returns the ordered ancestor chain up to the given File (inclusive), root-first.
    The chain is truncated at the first trashed ancestor: that ancestor is included but its own parents are not.
  security:
    - bearerHttpAuthentication: []
  parameters:
    - name: id
      in: path
      required: true
      description: File ID
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: Ordered ancestor chain up to the given File (inclusive), truncated at the first trashed ancestor
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../components/schemas/FilePathItem.yaml'
    '404':
      description: File not found
