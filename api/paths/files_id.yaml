patch:
  operationId: UpdateFile
  summary: Update a File
  security:
    - bearerHttpAuthentication: []
  parameters:
    - name: id
      in: path
      required: true
      description: File ID
      schema:
        type: string
        format: uuid
  requestBody:
    required: true
    content:
      multipart/form-data:
        schema:
          $ref: '../components/requestBodies/UpdateFileWithContentRequest.yaml'
      application/x-www-form-urlencoded:
        schema:
          $ref: '../components/requestBodies/UpdateFileRequest.yaml'
  responses:
    '200':
      description: File updated successfully
      content:
        application/json:
          schema:
            $ref: '../components/schemas/File.yaml'
    '400':
      description: Invalid request
    '404':
      description: File not found

delete:
  operationId: DeleteFile
  summary: Delete a File
  security:
    - bearerHttpAuthentication: []
  parameters:
    - name: id
      in: path
      required: true
      description: File ID
      schema:
        type: string
        format: uuid
  responses:
    '204':
      description: File deleted successfully
    '404':
      description: File not found
    '409':
      description: Cannot delete (e.g., directory not empty)
