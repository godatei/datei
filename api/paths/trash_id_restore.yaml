post:
  operationId: RestoreTrash
  summary: Restore an item from trash
  security:
    - bearerHttpAuthentication: []
  parameters:
    - name: dateiId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  requestBody:
    content:
      application/json:
        schema:
          $ref: '../components/schemas/RestoreDateiRequest.yaml'
  responses:
    '204':
      description: Successfully restored
    '400':
      description: Invalid input (parentId required or invalid)
    '404':
      description: Item not found or not in trash
