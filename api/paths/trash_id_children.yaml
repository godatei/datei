get:
  operationId: ListTrashChildren
  summary: List the contents of a trashed directory
  security:
    - bearerHttpAuthentication: []
  parameters:
    - name: dateiId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    - name: limit
      in: query
      description: Maximum number of results
      schema:
        type: integer
        default: 100
    - name: offset
      in: query
      description: Number of results to skip
      schema:
        type: integer
        default: 0
  responses:
    '200':
      description: List of items inside the trashed directory
      content:
        application/json:
          schema:
            $ref: '../components/schemas/ListDateiResponse.yaml'
    '404':
      description: Trashed directory not found or not trashed
