post:
  operationId: DisableUserMFAAdmin
  summary: Disable a user's MFA (admin only)
  security:
    - bearerHttpAuthentication: []
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '204':
      description: MFA disabled
    '403':
      description: Caller is not an admin, or MFA not enabled
    '404':
      description: User not found
