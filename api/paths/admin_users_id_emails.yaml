get:
  operationId: ListUserEmailsAdmin
  summary: List a user's emails (admin only)
  security:
    - bearerHttpAuthentication: []
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: List of emails
      content:
        application/json:
          schema:
            $ref: '../components/schemas/ListEmailsResponse.yaml'
    '403':
      description: Caller is not an admin
post:
  operationId: AddUserEmailAdmin
  summary: Add an email to a user (admin only)
  security:
    - bearerHttpAuthentication: []
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/AddEmailRequest.yaml'
  responses:
    '204':
      description: Email added
    '400':
      description: Invalid email or already in use
    '403':
      description: Caller is not an admin
