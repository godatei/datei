patch:
  operationId: SetPrimaryUserEmailAdmin
  summary: Set a user's email as primary (admin only)
  security:
    - bearerHttpAuthentication: []
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    - name: emailId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '204':
      description: Email set as primary
    '400':
      description: Email must be verified to set as primary
    '403':
      description: Caller is not an admin
    '404':
      description: Email not found
