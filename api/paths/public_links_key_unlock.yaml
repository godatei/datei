post:
  operationId: UnlockPublicLink
  summary: Unlock a public link and obtain a session JWT
  security: []
  parameters:
    - name: key
      in: path
      required: true
      schema:
        type: string
  requestBody:
    required: false
    content:
      application/json:
        schema:
          $ref: '../components/schemas/UnlockPublicLinkRequest.yaml'
  responses:
    '200':
      description: Link unlocked; use the returned token as a Bearer credential
      content:
        application/json:
          schema:
            $ref: '../components/schemas/UnlockPublicLinkResponse.yaml'
    '403':
      description: Code missing or invalid
    '404':
      description: Link not found, revoked, or expired
