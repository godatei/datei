get:
  operationId: ListLinks
  summary: List the authenticated user's links
  security:
    - bearerHttpAuthentication: []
  parameters:
    - name: status
      in: query
      description: Filter by link status; omit to return all
      schema:
        type: string
        enum: [active, expired, revoked]
    - name: limit
      in: query
      description: Maximum number of results
      schema:
        type: integer
        default: 100
    - name: offset
      in: query
      description: Number of results to skip
      schema:
        type: integer
        default: 0
  responses:
    '200':
      description: List of links
      content:
        application/json:
          schema:
            $ref: '../components/schemas/ListLinksResponse.yaml'

post:
  operationId: CreateLink
  summary: Create a new public link
  security:
    - bearerHttpAuthentication: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/CreateLinkRequest.yaml'
  responses:
    '201':
      description: Link created
      content:
        application/json:
          schema:
            $ref: '../components/schemas/LinkDetail.yaml'
    '400':
      description: Invalid request
