get:
  operationId: ListUsersAdmin
  summary: List all user accounts (admin only)
  security:
    - bearerHttpAuthentication: []
  parameters:
    - name: limit
      in: query
      description: Maximum number of results
      schema:
        type: integer
        default: 100
    - name: offset
      in: query
      description: Number of results to skip
      schema:
        type: integer
        default: 0
  responses:
    '200':
      description: List of users
      content:
        application/json:
          schema:
            $ref: '../components/schemas/ListAdminUsersResponse.yaml'
    '403':
      description: Caller is not an admin
post:
  operationId: CreateUserAdmin
  summary: Create a new user account (admin only)
  security:
    - bearerHttpAuthentication: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/AdminCreateUserRequest.yaml'
  responses:
    '201':
      description: User created
      content:
        application/json:
          schema:
            $ref: '../components/schemas/AdminUserListItem.yaml'
    '400':
      description: Invalid input or email already in use
    '403':
      description: Caller is not an admin
