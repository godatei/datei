<mat-sidenav-container
  class="nav-shell h-full"
  [class.nav-shell-handset]="isHandset()"
  [class.nav-shell-expanded]="expanded()"
>
  <mat-sidenav
    #drawer
    class="nav-rail"
    [class.nav-rail-expanded]="railExpanded()"
    fixedInViewport
    [attr.role]="isHandset() ? 'dialog' : null"
    [mode]="isHandset() ? 'over' : 'side'"
    [opened]="!isHandset()"
  >
    @if (!isHandset()) {
      <button
        type="button"
        matIconButton
        class="nav-rail-toggle"
        [attr.aria-expanded]="expanded()"
        [attr.aria-label]="expanded() ? 'Collapse navigation' : 'Expand navigation'"
        (click)="toggleExpanded()"
      >
        <mat-icon>{{ expanded() ? 'menu_open' : 'menu' }}</mat-icon>
      </button>
    }
    <nav class="nav-rail-items" aria-label="Main">
      @for (item of navItems; track item.route) {
        <a
          #railItem
          class="nav-rail-item"
          [routerLink]="item.route"
          routerLinkActive="active"
          ariaCurrentWhenActive="page"
          [routerLinkActiveOptions]="{ exact: item.exact }"
          (click)="onNavItemClick()"
        >
          <span
            class="nav-rail-indicator"
            matRipple
            [matRippleTrigger]="railItem"
            aria-hidden="true"
          ></span>
          <mat-icon aria-hidden="true">{{ item.icon }}</mat-icon>
          <span class="nav-rail-label">{{ item.label }}</span>
        </a>
      }
    </nav>
  </mat-sidenav>
  <mat-sidenav-content>
    <mat-toolbar color="primary" class="sticky top-0 z-10">
      @if (isHandset()) {
        <button type="button" aria-label="Toggle sidenav" matIconButton (click)="drawer.toggle()">
          <mat-icon aria-label="Side nav toggle icon">menu</mat-icon>
        </button>
      }
      <img ngSrc="datei-logo.svg" alt="Datei" width="32" height="32" />
      <span>Datei</span>
      <span class="grow shrink basis-auto"></span>
      <button mat-button [matMenuTriggerFor]="userMenu">
        <app-user-avatar [name]="userName()" size="xs" class="mr-1" />
        {{ userName() }}
      </button>
      <mat-menu #userMenu="matMenu">
        <a mat-menu-item routerLink="/settings">
          <mat-icon>settings</mat-icon>
          <span>Settings</span>
        </a>
        @if (isAdmin()) {
          <a mat-menu-item routerLink="/admin/users">
            <mat-icon>admin_panel_settings</mat-icon>
            <span>Admin</span>
          </a>
        }
        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Logout</span>
        </button>
      </mat-menu>
    </mat-toolbar>
    <!-- Add Content Here -->
    <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
