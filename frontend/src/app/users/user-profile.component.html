<mat-card>
  <mat-card-header><mat-card-title>Profile</mat-card-title></mat-card-header>
  <mat-card-content>
    <p class="mat-font-body-md mat-text-on-surface-variant mb-4">Manage display name</p>
    <form class="flex flex-col gap-3" [formRoot]="profileForm">
      <mat-form-field class="w-full" appearance="outline">
        <mat-label>Name</mat-label>
        <input matInput [formField]="profileForm.name" />
      </mat-form-field>
      <button
        mat-flat-button
        type="submit"
        [disabled]="profileForm().submitting() || !profileForm().dirty() || profileForm().invalid()"
        class="self-end"
      >
        Save
      </button>
    </form>
  </mat-card-content>
</mat-card>
