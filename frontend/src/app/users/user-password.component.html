<mat-card>
  <mat-card-header>
    <mat-card-title>
      @if (requireCurrentPassword()) {
        Change Password
      } @else {
        Reset Password
      }
    </mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <p class="mat-font-body-md mat-text-on-surface-variant mb-4">
      @if (requireCurrentPassword()) {
        Update your password
      } @else {
        Set a new password for this user
      }
    </p>
    <form class="flex flex-col gap-2" [formRoot]="passwordForm">
      @if (requireCurrentPassword()) {
        <mat-form-field class="w-full" appearance="outline">
          <mat-label>Current password</mat-label>
          <input
            matInput
            [formField]="passwordForm.currentPassword"
            type="password"
            autocomplete="current-password"
          />
        </mat-form-field>
      }
      <app-password-confirm
        [password]="passwordForm.password"
        [confirmPassword]="passwordForm.confirmPassword"
        passwordLabel="New password"
        confirmLabel="Confirm new password"
      />
      <button mat-flat-button type="submit" [disabled]="!canSubmit()">
        @if (requireCurrentPassword()) {
          Change password
        } @else {
          Reset password
        }
      </button>
    </form>
  </mat-card-content>
</mat-card>
