<h2 mat-dialog-title>New folder</h2>
<mat-dialog-content>
  <div class="pt-2">
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Folder name</mat-label>
      <input
        matInput
        [formControl]="nameControl"
        (keydown.enter)="confirm()"
        autocomplete="off"
        aria-label="Folder name"
      />
      @if (nameControl.hasError('required')) {
        <mat-error>Name is required</mat-error>
      } @else if (nameControl.hasError('maxlength')) {
        <mat-error>Name must be 255 characters or fewer</mat-error>
      }
    </mat-form-field>
  </div>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-button color="primary" (click)="confirm()" [disabled]="nameControl.invalid">
    Create
  </button>
</mat-dialog-actions>
