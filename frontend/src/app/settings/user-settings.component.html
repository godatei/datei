<div class="max-w-xl mx-auto flex flex-col gap-6 px-4 my-8">
  <h2 class="mat-font-headline-sm m-0">Settings</h2>

  @if (user(); as u) {
    <app-user-profile [port]="port" [name]="u.name" (changed)="load()" />
    <app-user-emails [port]="port" />
    <app-user-password [port]="port" [requireCurrentPassword]="true" />
    <app-user-mfa [port]="port" [mfaEnabled]="u.mfaEnabled" (changed)="load()" />
  }
</div>
