<div class="flex justify-center items-center min-h-screen p-4 mat-bg-surface-container-low">
  <mat-card class="auth-card w-full max-w-md">
    <mat-card-content>
      <div class="flex flex-col items-center mb-6 text-center">
        <mat-icon class="mb-3 mat-text-primary text-5xl w-12 h-12">cloud_upload</mat-icon>
        <h1 class="mat-font-title-lg m-0">Reset your password</h1>
        <p class="mat-font-body-md mat-text-on-surface-variant mt-1">We'll send you a reset link</p>
      </div>

      @if (success()) {
        <p class="text-center mat-font-body-md mat-text-on-surface-variant">
          If an account exists with that email, you will receive a password reset link shortly.
        </p>
        <a class="w-full mt-2" routerLink="/login" mat-flat-button>Back to sign in</a>
      } @else {
        <form class="flex flex-col gap-3" [formRoot]="form">
          <mat-form-field class="w-full" appearance="outline">
            <mat-label>Email</mat-label>
            <input matInput [formField]="form.email" type="email" autocomplete="email" />
          </mat-form-field>

          <button
            class="w-full mt-2"
            mat-flat-button
            type="submit"
            [disabled]="form().submitting() || form().invalid()"
          >
            @if (form().submitting()) {
              <mat-spinner diameter="20"></mat-spinner>
            } @else {
              Send reset link
            }
          </button>
        </form>

        <div class="flex justify-center gap-2 mt-6">
          <a
            routerLink="/login"
            class="mat-font-label-lg mat-text-primary no-underline hover:underline"
            >Back to sign in</a
          >
        </div>
      }
    </mat-card-content>
  </mat-card>
</div>
