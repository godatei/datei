<div class="auth-container">
  <mat-card class="auth-card">
    <mat-card-content>
      <div class="auth-header">
        <img ngSrc="datei-logo.svg" class="brand-logo" alt="Datei" width="48" height="48" />
        <h1>Sign in</h1>
        <p class="subtitle">to continue to Datei</p>
      </div>

      @if (errorMessage()) {
        <div class="error-banner">{{ errorMessage() }}</div>
      }

      @if (!mfaRequired()) {
        <form class="auth-form" (submit)="onSubmit($event)">
          <mat-form-field class="form-field" appearance="outline">
            <mat-label>Email</mat-label>
            <input matInput [formField]="loginForm.email" type="email" autocomplete="email" />
          </mat-form-field>

          <mat-form-field class="form-field" appearance="outline">
            <mat-label>Password</mat-label>
            <input
              matInput
              [formField]="loginForm.password"
              type="password"
              autocomplete="current-password"
            />
          </mat-form-field>

          <button
            class="submit-btn"
            mat-flat-button
            type="submit"
            [disabled]="loading() || loginForm().invalid()"
          >
            @if (loading()) {
              <mat-spinner diameter="20"></mat-spinner>
            } @else {
              Sign in
            }
          </button>
        </form>

        <div class="auth-links">
          <a routerLink="/forgot">Forgot password?</a>
          <a routerLink="/register">Create an account</a>
        </div>
      } @else {
        <form class="auth-form" (submit)="onMFASubmit($event)">
          <mat-form-field class="form-field" appearance="outline">
            <mat-label>MFA Code</mat-label>
            <input matInput [formField]="mfaForm.code" autocomplete="one-time-code" />
            <mat-hint>Enter your 6-digit code or a recovery code</mat-hint>
          </mat-form-field>

          <button
            class="submit-btn"
            mat-flat-button
            type="submit"
            [disabled]="loading() || mfaForm().invalid()"
          >
            @if (loading()) {
              <mat-spinner diameter="20"></mat-spinner>
            } @else {
              Verify
            }
          </button>
        </form>
      }
    </mat-card-content>
  </mat-card>
</div>
