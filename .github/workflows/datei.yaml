# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Datei

on:
  push:
    branches:
      - 'main'
    tags:
      - '*'
  pull_request:

jobs:
  validate-migrations:
    name: Validate migrations
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: hack/validate-migrations.sh

  lint-and-test-go:
    name: Lint and test (Go)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          check-latest: true
          cache-dependency-path: |
            go.sum
      - name: Run go tests
        run: go test ./...
      - name: Lint with golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: 'v2.11.4' # renovate: datasource=github-releases depName=golangci/golangci-lint

  lint-and-test-node:
    name: Lint and test (Node)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
      - name: Setup node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm run lint
      - name: Test
        run: pnpm run test

  build:
    services:
      postgres:
        image: postgres:18.3-alpine3.23
        env:
          POSTGRES_USER: test-user
          POSTGRES_PASSWORD: test-password
          POSTGRES_DB: datei
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      storage:
        image: rustfs/rustfs:1.0.0-alpha.83
        env:
          RUSTFS_ACCESS_KEY: local
          RUSTFS_SECRET_KEY: local
        ports:
          - 9000:9000
    name: Build
    timeout-minutes: 20
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate commit hash
        id: hash
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Generate Docker Metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/godatei/datei
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
          flavor: |
            latest=false
          labels: |
            org.opencontainers.image.description=Datei
            org.opencontainers.image.vendor=Glasskube

      - name: Build Docker image (amd64)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          platforms: linux/amd64
          context: .
          load: true
          tags: datei:ci
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ steps.hash.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Verify migrations
        run: |
          docker run --rm --network host $DATEI_ENV datei:ci migrate
          psql $DATEI_DATABASE_URI -c "select version >= 0, dirty from schema_migrations" --csv -t | grep "t,f"
          docker run --rm --network host $DATEI_ENV datei:ci migrate --down
        env:
          DATEI_DATABASE_URI: postgres://test-user:test-password@localhost:5432/datei
          DATEI_ENV: >-
            -e DATEI_AUTH_JWT_SECRET=H4V7z6mEpe8/k5H/KyogT/iATJhNpEIUMd5cHF6mqF8=
            -e DATEI_DATABASE_URI=postgres://test-user:test-password@localhost:5432/datei
            -e DATEI_SERVER_ADDR=0.0.0.0:8080
            -e DATEI_STORAGE_S3_BUCKET=datei
            -e DATEI_STORAGE_S3_ENDPOINT=http://localhost:9000
            -e DATEI_STORAGE_S3_REGION=local
            -e DATEI_STORAGE_S3_USE_PATH_STYLE=true
            -e DATEI_STORAGE_S3_ACCESS_KEY_ID=local
            -e DATEI_STORAGE_S3_SECRET_ACCESS_KEY=local

      - name: Login to GitHub Container Registry (tag only)
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (tag only, multi-platform)
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        id: build-push
        with:
          platforms: linux/amd64,linux/arm64
          context: .
          push: true
          sbom: true
          provenance: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ steps.hash.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        if: ${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Sign the images with GitHub OIDC Token
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        env:
          DIGEST: ${{ steps.build-push.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          images=""
          for tag in ${TAGS}; do
            images+="${tag}@${DIGEST} "
          done
          cosign sign --yes ${images}
