version: "2"
sql:
  - engine: "postgresql"
    queries: "query.sql"
    schema: "schema.sql"
    gen:
      go:
        package: "db"
        out: "."
        sql_package: "pgx/v5"
        emit_db_tags: true
        emit_pointers_for_null_types: true

overrides:
  go:
    overrides:
      - db_type: "uuid"
        nullable: false
        go_type:
          import: "github.com/google/uuid"
          type: "UUID"
      - db_type: "uuid"
        nullable: true
        go_type:
          import: "github.com/google/uuid"
          type: "UUID"
          pointer: true
      - db_type: "timestamp"
        nullable: false
        go_type:
          import: "time"
          type: "Time"
      - db_type: "timestamp"
        nullable: true
        go_type:
          import: "time"
          type: "Time"
          pointer: true
      - db_type: "timestamptz"
        nullable: false
        go_type:
          import: "time"
          type: "Time"
      - db_type: "timestamptz"
        nullable: true
        go_type:
          import: "time"
          type: "Time"
          pointer: true
