version: '2'
sql:
  - engine: 'postgresql'
    queries:
      - 'datei.sql'
      - 'datei_event.sql'
      - 'user_account_event.sql'
      - 'user_account.sql'
    schema: 'zz_generated_schema.sql'
    gen:
      go:
        package: 'db'
        out: '.'
        sql_package: 'pgx/v5'
        emit_db_tags: true
        emit_pointers_for_null_types: true
        output_models_file_name: zz_generated.models.go
        output_db_file_name: zz_generated.db.go

overrides:
  go:
    overrides:
      - db_type: 'uuid'
        nullable: false
        go_type:
          import: 'github.com/google/uuid'
          type: 'UUID'
      - db_type: 'uuid'
        nullable: true
        go_type:
          import: 'github.com/google/uuid'
          type: 'UUID'
          pointer: true
      - db_type: 'pg_catalog.timestamp'
        nullable: false
        go_type:
          import: 'time'
          type: 'Time'
      - db_type: 'pg_catalog.timestamp'
        nullable: true
        go_type:
          import: 'time'
          type: 'Time'
          pointer: true
      - db_type: 'pg_catalog.timestamptz'
        nullable: false
        go_type:
          import: 'time'
          type: 'Time'
      - db_type: 'pg_catalog.timestamptz'
        nullable: true
        go_type:
          import: 'time'
          type: 'Time'
          pointer: true
